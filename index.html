<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>START</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131f; --border: #1e1e30;
    --accent: #7c3aed; --accent2: #a855f7; --glow: rgba(124,58,237,0.35);
    --text: #e2e2f0; --muted: #6b6b8a; --cyan: #06b6d4; --gold: #f59e0b;
  }
  html,body { height:100%; background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(var(--border) 1px,transparent 1px), linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:40px 40px; opacity:0.35; z-index:0; pointer-events:none;
  }
  body::after {
    content:''; position:fixed; top:-30%; left:50%; transform:translateX(-50%);
    width:600px; height:600px;
    background:radial-gradient(circle,rgba(124,58,237,0.18) 0%,transparent 70%);
    z-index:0; pointer-events:none; animation:pulse 6s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{opacity:0.6;transform:translateX(-50%) scale(1)}
    50%{opacity:1;transform:translateX(-50%) scale(1.1)}
  }
  .wrapper { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:28px 16px 40px; gap:24px; }
  .clock-block { text-align:center; margin-bottom:-4px; }
  .clock { font-size:clamp(56px,18vw,88px); font-weight:700; line-height:1; letter-spacing:4px; background:linear-gradient(135deg,#fff 30%,var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; filter:drop-shadow(0 0 20px var(--glow)); }
  .date { font-size:13px; color:var(--muted); letter-spacing:3px; text-transform:uppercase; margin-top:4px; }
  .search-wrap { width:100%; max-width:520px; display:flex; gap:8px; align-items:center; }
  .engine-btn { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:10px; cursor:pointer; transition:border-color 0.2s; -webkit-tap-highlight-color:transparent; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .engine-btn svg,.engine-btn img { width:22px; height:22px; }
  .engine-btn:active { border-color:var(--accent); }
  .search-input-wrap { position:relative; flex:1; }
  .search-input-wrap input { width:100%; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 48px 14px 16px; color:var(--text); font-size:15px; outline:none; transition:border-color 0.2s,box-shadow 0.2s; }
  .search-input-wrap input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--glow); }
  .search-input-wrap input::placeholder { color:var(--muted); }
  .search-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; color:var(--accent2); display:flex; align-items:center; padding:4px; }
  .engine-popup { display:none; position:absolute; top:calc(100% + 8px); left:0; background:var(--surface); border:1px solid var(--border); border-radius:12px; overflow:hidden; z-index:100; min-width:190px; box-shadow:0 8px 24px rgba(0,0,0,0.5); }
  .engine-popup.open { display:block; }
  .engine-option { padding:12px 16px; cursor:pointer; display:flex; align-items:center; gap:10px; font-size:14px; color:var(--text); transition:background 0.15s; }
  .engine-option svg { width:18px; height:18px; flex-shrink:0; }
  .engine-option:hover,.engine-option.active { background:rgba(124,58,237,0.2); }
  .engine-wrap { position:relative; flex-shrink:0; }
  .section-label { width:100%; max-width:520px; font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:10px; margin-bottom:-10px; }
  .section-label::after { content:''; flex:1; height:1px; background:var(--border); }
  .links-grid { width:100%; max-width:520px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .link-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:14px 10px; text-decoration:none; color:var(--text); display:flex; flex-direction:column; align-items:center; gap:7px; transition:border-color 0.2s,transform 0.15s,box-shadow 0.2s; -webkit-tap-highlight-color:transparent; }
  .link-card:active { transform:scale(0.96); }
  .link-card:hover { border-color:var(--accent); box-shadow:0 0 14px var(--glow); }
  .link-icon { width:32px; height:32px; }
  .link-name { font-size:11px; color:var(--muted); letter-spacing:0.5px; text-align:center; }
  .link-card.anime { border-top:2px solid var(--accent2); }
  .link-card.manga { border-top:2px solid var(--cyan); }
  .link-card.game  { border-top:2px solid var(--gold); }

  #wp-layer { position:fixed; inset:0; z-index:0; background-size:cover; background-position:center; background-repeat:no-repeat; }
  body.has-wp::before { opacity:0.12; }
  body.has-wp::after  { opacity:0.4; }
  body.has-wp .link-card,
  body.has-wp .search-input-wrap input,
  body.has-wp .engine-btn { backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); background:rgba(10,10,15,0.55) !important; }

  #gear-btn { position:fixed; bottom:18px; right:18px; z-index:200; width:42px; height:42px; border-radius:50%; background:var(--surface); border:1px solid var(--border); color:var(--muted); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:border-color 0.2s,color 0.2s,transform 0.3s; -webkit-tap-highlight-color:transparent; }
  #gear-btn:active { border-color:var(--accent); color:var(--accent2); transform:rotate(60deg); }
  #settings-panel { display:none; position:fixed; inset:0; z-index:300; background:rgba(0,0,0,0.7); align-items:flex-end; justify-content:center; }
  #settings-panel.open { display:flex; }
  .settings-sheet { background:var(--surface); border:1px solid var(--border); border-bottom:none; border-radius:20px 20px 0 0; width:100%; max-width:520px; padding:24px 20px 36px; display:flex; flex-direction:column; gap:16px; max-height:80vh; overflow-y:auto; }
  .settings-title { font-size:13px; letter-spacing:3px; text-transform:uppercase; color:var(--muted); }
  .wp-count { font-size:12px; color:var(--muted); margin-left:6px; }
  .wp-actions { display:flex; gap:10px; }
  .wp-btn { flex:1; padding:13px 10px; border-radius:10px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:13px; cursor:pointer; text-align:center; transition:border-color 0.2s; -webkit-tap-highlight-color:transparent; }
  .wp-btn:active { border-color:var(--accent); }
  .wp-btn.danger { color:#f87171; border-color:#3f1212; background:#1a0a0a; }
  .wp-thumbs { display:flex; gap:8px; flex-wrap:wrap; min-height:20px; }
  .wp-thumb-wrap { position:relative; display:inline-block; }
  .wp-thumb { width:64px; height:64px; border-radius:8px; object-fit:cover; border:2px solid var(--border); display:block; }
  .wp-thumb.active-wp { border-color:var(--accent2); box-shadow:0 0 8px var(--glow); }
  .wp-del { position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%; background:#ef4444; border:none; color:#fff; font-size:12px; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:10; padding:0; line-height:1; }
  .wp-note { font-size:11px; color:var(--muted); }
  #wp-file-input { display:none; }
</style>
</head>
<body>
<div id="wp-layer"></div>
<div class="wrapper">
  <div class="clock-block">
    <div class="clock" id="clock">00:00</div>
    <div class="date" id="date">Loading...</div>
  </div>

  <div class="search-wrap">
    <div class="engine-wrap">
      <button class="engine-btn" id="engineBtn" onclick="toggleEngines()">
        <!-- Google icon default -->
        <svg id="engineIcon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      </button>
      <div class="engine-popup" id="enginePopup">
        <div class="engine-option active" onclick="selectEngine(0,'Google','https://www.google.com/search?q=')">
          <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
          Google
        </div>
        <div class="engine-option" onclick="selectEngine(1,'YouTube','https://www.youtube.com/results?search_query=')">
          <svg viewBox="0 0 48 48"><path fill="#FF0000" d="M47.5 14s-.5-3.5-2-5c-2-2-4.2-2-5.2-2.1C33.8 6.5 24 6.5 24 6.5s-9.8 0-16.3.4C6.7 7 4.5 7 2.5 9 1 10.5.5 14 .5 14S0 18.1 0 22.2v3.9C0 30.2.5 34.3.5 34.3s.5 3.5 2 5c2 2 4.6 1.9 5.8 2.1C12.2 41.8 24 42 24 42s9.8 0 16.3-.5c1-.1 3.2-.1 5.2-2.1 1.5-1.5 2-5 2-5s.5-4.1.5-8.2v-3.9C48 18.1 47.5 14 47.5 14z"/><path fill="#fff" d="M19 31V17l13 7-13 7z"/></svg>
          YouTube
        </div>
        <div class="engine-option" onclick="selectEngine(2,'Bing','https://www.bing.com/search?q=')">
          <svg viewBox="0 0 48 48"><path fill="#0078D4" d="M8 4l8 3v28l10-6 8 4-18 11V19l-8-3z"/></svg>
          Bing
        </div>
        <div class="engine-option" onclick="selectEngine(3,'DuckDuckGo','https://duckduckgo.com/?q=')">
          <svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" fill="#DE5833"/><circle cx="24" cy="20" r="12" fill="#fff"/><circle cx="24" cy="20" r="8" fill="#3F3F3F"/><circle cx="27" cy="17" r="3" fill="#fff"/><path fill="#fff" d="M18 32c0 4 12 4 12 0"/></svg>
          DuckDuckGo
        </div>
      </div>
    </div>
    <div class="search-input-wrap">
      <input type="text" id="search" placeholder="Search Google..." autocomplete="off"/>
      <button class="search-btn" onclick="doSearch()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
  </div>

  <!-- Anime & Streaming -->
  <div class="section-label">Anime & Streaming</div>
  <div class="links-grid">
    <a class="link-card anime" href="https://crunchyroll.com">
      <svg class="link-icon" viewBox="0 0 48 48"><circle cx="24" cy="24" r="22" fill="#F47521"/><path fill="#fff" d="M24 10c-7.7 0-14 6.3-14 14s6.3 14 14 14 14-6.3 14-14S31.7 10 24 10zm0 22c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8z"/><circle cx="30" cy="18" r="3" fill="#fff"/></svg>
      <span class="link-name">Crunchyroll</span>
    </a>
    <a class="link-card anime" href="https://dodo-tv.live">
      <svg class="link-icon" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#1a1a2e"/><rect x="8" y="12" width="32" height="22" rx="3" fill="#4fc3f7"/><rect x="18" y="34" width="12" height="4" fill="#b0bec5"/><rect x="12" y="38" width="24" height="2" rx="1" fill="#b0bec5"/><polygon points="20,18 20,28 30,23" fill="#1a1a2e"/></svg>
      <span class="link-name">Dodo TV</span>
    </a>
    <a class="link-card anime" href="https://www.youtube.com">
      <svg class="link-icon" viewBox="0 0 48 48"><path fill="#FF0000" d="M47.5 14s-.5-3.5-2-5c-2-2-4.2-2-5.2-2.1C33.8 6.5 24 6.5 24 6.5s-9.8 0-16.3.4C6.7 7 4.5 7 2.5 9 1 10.5.5 14 .5 14S0 18.1 0 22.2v3.9C0 30.2.5 34.3.5 34.3s.5 3.5 2 5c2 2 4.6 1.9 5.8 2.1C12.2 41.8 24 42 24 42s9.8 0 16.3-.5c1-.1 3.2-.1 5.2-2.1 1.5-1.5 2-5 2-5s.5-4.1.5-8.2v-3.9C48 18.1 47.5 14 47.5 14z"/><path fill="#fff" d="M19 31V17l13 7-13 7z"/></svg>
      <span class="link-name">YouTube</span>
    </a>
  </div>

  <!-- Manga / Manhwa / Manhua -->
  <div class="section-label">Manga / Manhwa / Manhua</div>
  <div class="links-grid">
    <a class="link-card manga" href="https://asuracomic.net">
      <svg class="link-icon" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#1a0a2e"/><path fill="#a855f7" d="M14 36L24 8l10 28"/><path fill="#7c3aed" d="M17 28h14l-7-18z" opacity="0.6"/><path fill="#e2b04a" d="M10 20l4 2-4 2zM38 20l-4 2 4 2z"/></svg>
      <span class="link-name">Asura Scan</span>
    </a>
    <a class="link-card manga" href="https://mangafire.to">
      <svg class="link-icon" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#1a0800"/><path fill="#FF4500" d="M24 6 C16 14 12 20 14 28c1 4 4 7 10 8-3-3-4-7-2-10 2 4 6 6 10 5-4-2-6-6-5-10 3 5 8 7 9 12 1 4-1 8-4 10 8-2 12-9 10-16C40 18 30 10 24 6z"/><path fill="#FF8C00" d="M22 22c-2 3-2 7 0 10-2-1-4-4-4-7 0-2 2-4 4-3z"/></svg>
      <span class="link-name">MangaFire</span>
    </a>
    <a class="link-card manga" href="https://aquamanga.com">
      <svg class="link-icon" viewBox="0 0 48 48"><rect width="48" height="48" rx="10" fill="#001a2e"/><path fill="#06b6d4" d="M24 8 C20 16 14 20 14 28c0 6 4.5 10 10 10s10-4 10-10c0-8-6-12-10-20z"/><path fill="#0ea5e9" d="M24 32c-3 0-5-2-5-4 0-3 2-5 5-8 3 3 5 5 5 8 0 2-2 4-5 4z" opacity="0.7"/></svg>
      <span class="link-name">AquaScan</span>
    </a>
  </div>

  <!-- Gaming -->
  <div class="section-label">Gaming</div>
  <div style="width:100%;max-width:520px;">
    <div id="gaming-card" style="background:var(--surface);border:1px solid var(--border);border-top:2px solid var(--gold);border-radius:12px;overflow:hidden;display:flex;flex-direction:column;">
      <div style="position:relative;height:140px;background:#0a0a0f;display:flex;align-items:center;justify-content:center;overflow:hidden;">
        <div id="gaming-img-placeholder" style="font-size:64px;opacity:0.15;user-select:none;">🎮</div>
        <div id="gaming-img-overlay" style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,var(--surface));"></div>
        <div style="position:absolute;top:10px;left:12px;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);opacity:0.8;">Did you know?</div>
      </div>
      <div style="padding:14px 16px 16px;display:flex;flex-direction:column;gap:6px;">
        <div id="gaming-fact" style="font-size:13px;line-height:1.6;color:var(--text);"></div>
        <div id="gaming-source" style="font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:2px;"></div>
      </div>
    </div>

</div>

<button id="gear-btn" onclick="openSettings()">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
</button>
<div id="settings-panel" onclick="handleOverlayClick(event)">
  <div class="settings-sheet">
    <div class="settings-title">Wallpapers<span class="wp-count" id="wp-count"></span></div>
    <div class="wp-thumbs" id="wp-thumbs"></div>
    <div class="wp-actions">
      <label class="wp-btn" for="wp-file-input">＋ Add Images</label>
      <input type="file" id="wp-file-input" accept="image/*" multiple onchange="addWallpapers(event)"/>
      <button class="wp-btn danger" onclick="clearAll()">✕ Clear All</button>
    </div>
    <div class="wp-note">Full quality · stored on device · max 10</div>
  </div>
</div>

<script>
  const engineSVGs = [
    document.querySelector('.engine-option:nth-child(1) svg').outerHTML,
    document.querySelector('.engine-option:nth-child(2) svg').outerHTML,
    document.querySelector('.engine-option:nth-child(3) svg').outerHTML,
    document.querySelector('.engine-option:nth-child(4) svg').outerHTML,
  ];
  let currentUrl = 'https://www.google.com/search?q=';

  function toggleEngines() {
    document.getElementById('enginePopup').classList.toggle('open');
  }

  function selectEngine(idx, name, url) {
    currentUrl = url;
    document.getElementById('engineIcon').outerHTML = engineSVGs[idx].replace('<svg ', '<svg id="engineIcon" ');
    document.querySelectorAll('.engine-option').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');
    document.getElementById('enginePopup').classList.remove('open');
    document.getElementById('search').placeholder = 'Search ' + name + '...';
  }

  document.addEventListener('click', function(e) {
    if (!e.target.closest('.engine-wrap')) document.getElementById('enginePopup').classList.remove('open');
  });

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    document.getElementById('date').textContent = days[now.getDay()] + ' · ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
  }

  updateClock();
  setInterval(updateClock, 1000);

  document.getElementById('search').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

  function doSearch() {
    const q = document.getElementById('search').value.trim();
    if (!q) return;
    window.location.href = q.startsWith('http') ? q : currentUrl + encodeURIComponent(q);
  }
  // ── Wallpaper Gallery (IndexedDB) ──────────────────
  const MAX_WP = 10;
  const DB_NAME = 'hp_wp_db', DB_STORE = 'wallpapers', DB_META = 'meta';
  let _db = null;

  function openDB() {
    if (_db) return Promise.resolve(_db);
    return new Promise((res, rej) => {
      const req = indexedDB.open(DB_NAME, 2);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE, { keyPath: 'id', autoIncrement: true });
        if (!db.objectStoreNames.contains(DB_META))  db.createObjectStore(DB_META);
      };
      req.onsuccess = e => { _db = e.target.result; res(_db); };
      req.onerror   = () => rej(req.error);
    });
  }

  function dbGetAll() {
    return openDB().then(db => new Promise((res, rej) => {
      const tx = db.transaction(DB_STORE, 'readonly');
      const req = tx.objectStore(DB_STORE).getAll();
      req.onsuccess = () => res(req.result);
      req.onerror   = () => rej(req.error);
    }));
  }

  function dbAdd(blob) {
    return openDB().then(db => new Promise((res, rej) => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      const req = tx.objectStore(DB_STORE).add({ blob });
      req.onsuccess = () => res(req.result);
      req.onerror   = () => rej(req.error);
    }));
  }

  function dbDelete(id) {
    return openDB().then(db => new Promise((res, rej) => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      const req = tx.objectStore(DB_STORE).delete(id);
      req.onsuccess = () => res();
      req.onerror   = () => rej(req.error);
    }));
  }

  function dbClear() {
    return openDB().then(db => new Promise((res, rej) => {
      const tx = db.transaction(DB_STORE, 'readwrite');
      const req = tx.objectStore(DB_STORE).clear();
      req.onsuccess = () => res();
      req.onerror   = () => rej(req.error);
    }));
  }

  function dbGetMeta(key) {
    return openDB().then(db => new Promise((res, rej) => {
      const tx = db.transaction(DB_META, 'readonly');
      const req = tx.objectStore(DB_META).get(key);
      req.onsuccess = () => res(req.result ?? null);
      req.onerror   = () => res(null);
    }));
  }

  function dbSetMeta(key, val) {
    return openDB().then(db => new Promise((res, rej) => {
      const tx = db.transaction(DB_META, 'readwrite');
      const req = tx.objectStore(DB_META).put(val, key);
      req.onsuccess = () => res();
      req.onerror   = () => rej(req.error);
    }));
  }

  function blobToURL(blob) {
    return URL.createObjectURL(blob);
  }

  function applyWallpaper(blob) {
    const url = blobToURL(blob);
    const layer = document.getElementById('wp-layer');
    const old = layer.dataset.blobUrl;
    if (old) URL.revokeObjectURL(old);
    layer.style.backgroundImage = 'url(' + url + ')';
    layer.dataset.blobUrl = url;
    document.body.classList.add('has-wp');
  }

  function clearWallpaper() {
    const layer = document.getElementById('wp-layer');
    const old = layer.dataset.blobUrl;
    if (old) URL.revokeObjectURL(old);
    layer.style.backgroundImage = '';
    layer.dataset.blobUrl = '';
    document.body.classList.remove('has-wp');
  }

  async function applyRandom(records) {
    if (!records.length) { clearWallpaper(); return null; }
    const lastId = await dbGetMeta('last_id');
    let rec;
    if (records.length === 1) {
      rec = records[0];
    } else {
      let candidates = records.filter(r => r.id !== lastId);
      if (!candidates.length) candidates = records;
      rec = candidates[Math.floor(Math.random() * candidates.length)];
    }
    await dbSetMeta('last_id', rec.id);
    applyWallpaper(rec.blob);
    return rec.id;
  }

  function renderThumbs(records, activeId) {
    const ct = document.getElementById('wp-thumbs');
    ct.innerHTML = '';
    records.forEach(rec => {
      const url  = blobToURL(rec.blob);
      const wrap = document.createElement('div'); wrap.className = 'wp-thumb-wrap';
      const img  = document.createElement('img');
      img.className = 'wp-thumb' + (rec.id === activeId ? ' active-wp' : '');
      img.src = url;
      img.onload = () => URL.revokeObjectURL(url);
      const del = document.createElement('button');
      del.className = 'wp-del'; del.textContent = '×';
      del.onclick = () => deleteWP(rec.id);
      wrap.appendChild(img); wrap.appendChild(del); ct.appendChild(wrap);
    });
    document.getElementById('wp-count').textContent = records.length ? records.length + '/10' : '(none)';
  }

  async function addWallpapers(e) {
    const files = Array.from(e.target.files);
    const records = await dbGetAll();
    const slots = MAX_WP - records.length;
    if (slots <= 0) { alert('Max 10 reached. Delete some first.'); return; }
    const toAdd = files.slice(0, slots);
    for (const f of toAdd) await dbAdd(f);
    const updated = await dbGetAll();
    const activeId = await applyRandom(updated);
    renderThumbs(updated, activeId);
    e.target.value = '';
  }

  async function deleteWP(id) {
    await dbDelete(id);
    await dbSetMeta('last_id', null);
    const records = await dbGetAll();
    if (records.length) {
      const activeId = await applyRandom(records);
      renderThumbs(records, activeId);
    } else {
      clearWallpaper();
      renderThumbs([], null);
    }
  }

  async function clearAll() {
    if (!confirm('Remove all wallpapers?')) return;
    await dbClear();
    await dbSetMeta('last_id', null);
    clearWallpaper();
    renderThumbs([], null);
  }

  async function openSettings() {
    const records = await dbGetAll();
    const activeId = await dbGetMeta('last_id');
    renderThumbs(records, activeId);
    document.getElementById('settings-panel').classList.add('open');
  }

  function handleOverlayClick(e) { if (e.target === document.getElementById('settings-panel')) closeSettings(); }
  function closeSettings() { document.getElementById('settings-panel').classList.remove('open'); }

  // Auto-apply on load
  (async function() {
    const records = await dbGetAll();
    if (records.length) await applyRandom(records);
